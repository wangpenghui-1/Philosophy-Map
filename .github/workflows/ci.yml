name: Quality gates

on:
  push:
    branches: [main, "codex/**", "agent/**"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run review:full
        env:
          CI: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: automated-review-report
          path: artifacts/review/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
